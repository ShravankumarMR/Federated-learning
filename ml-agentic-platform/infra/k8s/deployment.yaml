apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-agentic-platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-agentic-platform-api
  template:
    metadata:
      labels:
        app: ml-agentic-platform-api
    spec:
      containers:
        - name: api
          image: ml-agentic-platform:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ml-agentic-platform-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ml-agentic-platform-api
spec:
  selector:
    app: ml-agentic-platform-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
