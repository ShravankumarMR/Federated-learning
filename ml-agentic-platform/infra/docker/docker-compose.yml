version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
